<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio Minimal Browser Contact Sheet</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 48px;
      background: #e8e8e4;
      color: #050505;
      font-family: Inter, Helvetica, Arial, sans-serif;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 38px;
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 32px;
      color: #666660;
      font-size: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    figure {
      margin: 0;
      background: #fff;
      border: 1px solid #cfcfca;
      padding: 10px;
    }
    img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    figcaption {
      margin-top: 8px;
      font: 13px/1.2 "SFMono-Regular", Consolas, monospace;
      color: #666660;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <h1>Portfolio Minimal Browser Contact Sheet</h1>
  <p>Browser-captured PNG thumbnails from the 12-slide kc-24 signature pack case study.</p>
  <main class="grid">
    <figure><img src="slide-01.png" alt="Slide 01"><figcaption>01 hero index</figcaption></figure>
    <figure><img src="slide-02.png" alt="Slide 02"><figcaption>02 stamp field</figcaption></figure>
    <figure><img src="slide-03.png" alt="Slide 03"><figcaption>03 number split</figcaption></figure>
    <figure><img src="slide-04.png" alt="Slide 04"><figcaption>04 image grid</figcaption></figure>
    <figure><img src="slide-05.png" alt="Slide 05"><figcaption>05 photo list</figcaption></figure>
    <figure><img src="slide-06.png" alt="Slide 06"><figcaption>06 minimal map</figcaption></figure>
    <figure><img src="slide-07.png" alt="Slide 07"><figcaption>07 timeline</figcaption></figure>
    <figure><img src="slide-08.png" alt="Slide 08"><figcaption>08 dark network</figcaption></figure>
    <figure><img src="slide-09.png" alt="Slide 09"><figcaption>09 three steps</figcaption></figure>
    <figure><img src="slide-10.png" alt="Slide 10"><figcaption>10 logo grid</figcaption></figure>
    <figure><img src="slide-11.png" alt="Slide 11"><figcaption>11 before after</figcaption></figure>
    <figure><img src="slide-12.png" alt="Slide 12"><figcaption>12 decision</figcaption></figure>
  </main>
</body>
</html>
