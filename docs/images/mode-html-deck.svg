  <rect x="50" y="46" width="1180" height="628" rx="22" fill="#171a1d" stroke="#31363a"/>
  <rect x="88" y="84" width="1104" height="64" rx="12" fill="#0f1113" stroke="#31363a"/>
  <circle cx="124" cy="116" r="9" fill="#ff5f57"/>
