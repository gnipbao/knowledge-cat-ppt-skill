name: Bug report
description: Report a reproducible problem in Knowledge Cat PPT.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: request
    attributes:
      label: Original request
      description: What did you ask the agent to do?
    validations:
      required: true
  - type: dropdown
    id: lane
    attributes:
      label: Output lane
      options:
        - native-pptx
        - html-deck
        - image-first-pptx
        - review-only
        - skill packaging
        - unknown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Relevant artifacts
      description: Paste logs, validation output, screenshots, or a minimal deck plan.

